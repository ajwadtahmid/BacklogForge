name: backlogforge
description: "Steam game backlog manager — track, prioritise, and conquer your backlog."
publish_to: "none"

version: 1.0.0+5

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.0

  # Database — Drift wraps SQLite with type-safe Dart APIs and works
  # natively on Android, iOS, macOS, Windows, and Linux.
  drift: ^2.32.0
  drift_flutter: ^0.3.0
  path: ^1.9.0
  path_provider: ^2.1.0

  flutter_secure_storage: ^10.0.0

  # Compile-time environment variable injection from .env
  envied: ^1.3.5

  # Navigation
  go_router: ^17.2.0

  # Networking + auth
  http: ^1.6.0
  url_launcher: ^6.3.0

  # Lightweight key-value store used for instant theme reads before auth resolves.
  shared_preferences: ^2.3.0

  # UI
  cached_network_image: ^3.4.0
  flutter_slidable: ^4.0.0
  shimmer: ^3.0.0

  # File selection / save dialogs for JSON/CSV import-export
  file_selector: ^1.1.0

  # Stream utilities — used to debounce the stats watch stream
  rxdart: ^0.28.0

  # Typography — Space Grotesk for display/headings
  google_fonts: ^6.2.1

  # App version / build number read from pubspec at runtime
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Drift code generation — turns @DriftDatabase tables into type-safe Dart
  # classes. Run `dart run build_runner build` after editing a table file.
  drift_dev: ^2.32.0
  build_runner: ^2.13.0
  envied_generator: ^1.3.5

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/artwork/
