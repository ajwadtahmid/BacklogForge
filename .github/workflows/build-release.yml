name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate database code
        run: dart run build_runner build

      - name: Build Windows
        run: flutter build windows --release -v

      - name: Prepare Windows artifact
        run: |
          mkdir -p release
          Copy-Item -Recurse "build/windows/x64/runner/Release/*" "release/"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: backlogforge-windows
          path: release/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libx11-dev \
            pkg-config \
            cmake \
            ninja-build \
            clang \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libssl-dev \
            libsecret-1-dev \
            zsync

      - name: Get dependencies
        run: flutter pub get

      - name: Generate database code
        run: dart run build_runner build

      - name: Build Linux
        run: flutter build linux --release

      - name: Install linuxdeploy
        run: |
          mkdir -p linuxdeploy
          cd linuxdeploy
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x *.AppImage
          cd ..

      - name: Create AppImage
        run: |
          # Set up AppDir with proper structure
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy Flutter bundle
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          # Make binary executable
          chmod +x AppDir/usr/bin/backlogforge

          # Create .desktop file
          cat > AppDir/usr/share/applications/com.example.backlogforge.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=BacklogForge
          Comment=Steam game backlog manager
          Exec=backlogforge
          Icon=com.example.backlogforge
          Categories=Utility;
          Terminal=false
          EOF

          # Copy app icon if available
          if [ -f "store_assets/logos/linux_flathub/icon_256x256.png" ]; then
            cp store_assets/logos/linux_flathub/icon_256x256.png \
              AppDir/usr/share/icons/hicolor/256x256/apps/com.example.backlogforge.png
          fi

          # Create AppRun (launcher script)
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          APPDIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$APPDIR/usr/bin/lib:$LD_LIBRARY_PATH"
          exec "$APPDIR/usr/bin/backlogforge" "$@"
          EOF
          chmod +x AppDir/AppRun

          # Build AppImage
          export VERSION="${GITHUB_REF#refs/tags/v}"
          ./linuxdeploy/linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --output appimage \
            -v 2

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4.4.0
        with:
          name: backlogforge-linux
          path: BacklogForge-*.AppImage

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: backlogforge-windows
          path: windows-build/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4.1.7
        with:
          name: backlogforge-linux
          path: linux-build/

      - name: Prepare Windows archive
        run: |
          cd windows-build
          zip -r ../BacklogForge-Windows-${{ github.ref_name }}.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            BacklogForge-Windows-${{ github.ref_name }}.zip
            linux-build/BacklogForge-*.AppImage
          draft: true
          generate_release_notes: true
