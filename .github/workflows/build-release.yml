name: Build Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate database code
        run: dart run build_runner build

      - name: Build Windows
        run: flutter build windows --release -v

      - name: Build Windows installer
        run: |
          $version    = "${{ github.ref_name }}".TrimStart('v')
          $sourceDir  = "${{ github.workspace }}\build\windows\x64\runner\Release"
          $outputDir  = "${{ github.workspace }}\installer-output"
          $iconFile   = "${{ github.workspace }}\windows\runner\resources\app_icon.ico"
          $filename   = "BacklogForge-Setup-${{ github.ref_name }}"
          $iscc       = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"

          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          & $iscc `
            "/DMyAppVersion=$version" `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "/DOutputFilename=$filename" `
            "/DMyAppIcon=$iconFile" `
            "windows\installer\setup.iss"

          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: backlogforge-windows
          path: installer-output\BacklogForge-Setup-*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libx11-dev \
            pkg-config \
            cmake \
            ninja-build \
            clang \
            libxinerama-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libssl-dev \
            libsecret-1-dev \
            libsqlite3-dev \
            libsqlite3-0 \
            zsync

      - name: Get dependencies
        run: flutter pub get

      - name: Generate database code
        run: dart run build_runner build

      - name: Build Linux
        run: flutter build linux --release -v

      - name: Install linuxdeploy
        run: |
          mkdir -p linuxdeploy
          cd linuxdeploy
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage
          chmod +x *.AppImage
          cd ..

      - name: Create AppImage
        run: |
          BUNDLE=build/linux/x64/release/bundle

          # Copy entire Flutter bundle â€” preserves relative lib/ path the binary expects
          mkdir -p AppDir/usr/bin
          cp -r $BUNDLE/* AppDir/usr/bin/
          chmod +x AppDir/usr/bin/backlogforge

          # Bundle libsqlite3 â€” sqlite3 (Dart) loads it dynamically via FFI,
          # so linuxdeploy won't detect it from RPATH. Must be manually included.
          SQLITE_LIB=$(dpkg -L libsqlite3-0 | grep 'libsqlite3.so.0$')
          cp "$SQLITE_LIB" AppDir/usr/bin/lib/
          ln -sf libsqlite3.so.0 AppDir/usr/bin/lib/libsqlite3.so

          # Bundle libsecret â€” flutter_secure_storage also loads it via FFI
          SECRET_LIB=$(dpkg -L libsecret-1-0 | grep 'libsecret-1.so.0$')
          cp "$SECRET_LIB" AppDir/usr/bin/lib/

          # AppRun â€” sets LD_LIBRARY_PATH so bundled libs are found at runtime
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          APPDIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$APPDIR/usr/bin/lib:$LD_LIBRARY_PATH"
          exec "$APPDIR/usr/bin/backlogforge" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # Desktop file
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/com.example.backlogforge.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=BacklogForge
          Comment=Steam game backlog manager
          Exec=backlogforge
          Icon=com.example.backlogforge
          Categories=Utility;
          Terminal=false
          EOF

          # Icon
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          if [ -f "store_assets/logos/linux_flathub/icon_256x256.png" ]; then
            cp store_assets/logos/linux_flathub/icon_256x256.png \
              AppDir/usr/share/icons/hicolor/256x256/apps/com.example.backlogforge.png
          fi

          export VERSION="${GITHUB_REF#refs/tags/v}"
          ./linuxdeploy/linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --output appimage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: backlogforge-linux
          path: BacklogForge-*.AppImage

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: backlogforge-windows
          path: windows-build/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: backlogforge-linux
          path: linux-build/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows-build/BacklogForge-Setup-*.exe
            linux-build/BacklogForge-*.AppImage
          draft: true
          generate_release_notes: true
